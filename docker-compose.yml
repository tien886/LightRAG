services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buddyai-rag
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:}
    volumes:
      - rag_working:/app/rag_working
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - buddyai-net

  neo4j:
    image: neo4j:5.26-community
    container_name: buddyai-neo4j
    hostname: neo4j
    ports:
      - "7474:7474" 
      - "7687:7687"  
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_connector_bolt_enabled: true
      NEO4J_dbms_connector_http_enabled: true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./rag_working/neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - buddyai-net

volumes:
  neo4j_data:     
  neo4j_logs:     
  rag_working:    
